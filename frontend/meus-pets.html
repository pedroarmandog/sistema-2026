<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Meus Pets - Pet Cria</title>
    <script src="/custom-colors.js"></script>
    <link
      rel="shortcut icon"
      href="/fivecon/Design sem nome (17).png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/colors.css" />
    <link rel="stylesheet" href="/dashboard.css" />
    <link rel="stylesheet" href="/meus-pets.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      /* small fallback to keep header spacing consistent */
      .page-header {
        padding: 18px 24px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo">
        <img
          src="/logos/logo_pet_cria-removebg-preview.png"
          class="logo-pet-cria"
          alt="Logo Pet Cria"
        />
      </div>
      <!-- Simplified nav to match system -->
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"
          ><i class="fas fa-chart-bar"></i><span>Dashboard</span></a
        >
        <a href="#" class="nav-item"
          ><i class="fas fa-cube"></i><span>Item</span></a
        >
        <a href="/clientes.html" class="nav-item active"
          ><i class="fas fa-users"></i><span>Clientes</span></a
        >
        <a href="/meus-pets.html" class="nav-item"
          ><i class="fas fa-dog"></i><span>Meus Pets</span></a
        >
      </nav>
    </div>

    <div class="main-content">
      <header class="header page-header">
        <div class="header-left">
          <button class="menu-toggle"><i class="fas fa-bars"></i></button>
          <h1>Módulo de Pets</h1>
        </div>
        <div
          class="header-right"
          style="display: flex; align-items: center; gap: 10px"
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <button class="btn btn-secondary" id="btnExport">
              <i class="fas fa-file-export"></i> Exportar
            </button>
            <button class="btn btn-primary" id="btnAddPet">
              <i class="fas fa-plus"></i> Adicionar Pet
            </button>
          </div>
        </div>
      </header>

      <section class="content" style="padding: 18px">
        <div
          class="toolbar"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
          "
        >
          <div style="flex: 1; max-width: 720px">
            <input
              id="searchInput"
              type="text"
              placeholder="Você pode pesquisar pelo nome do pet, microchip, código ou nome do cliente"
              class="search-input"
            />
          </div>
          <div style="width: 12px"></div>
        </div>

        <div class="table-wrap">
          <table class="pets-table">
            <thead>
              <tr>
                <th style="width: 80px">Código</th>
                <th style="width: 64px">Foto</th>
                <th>Nome</th>
                <th>Cliente</th>
                <th style="width: 80px">Ativo</th>
                <th style="width: 60px">Ações</th>
              </tr>
            </thead>
            <tbody id="petsTableBody">
              <tr>
                <td
                  colspan="6"
                  style="text-align: center; padding: 40px; color: #6c757d"
                >
                  <i
                    class="fas fa-spinner fa-spin"
                    style="margin-right: 8px; color: #3498db"
                  ></i
                  >Carregando pets...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="/meus-pets.js"></script>
    <script src="/sidebar-component/inject-sidebar.js"></script>
  </body>
</html>
