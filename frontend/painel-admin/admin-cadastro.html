<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Admin - PetHub</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .register-container {
        background: #fff;
        border-radius: 20px;
        width: 560px;
        max-width: 95vw;
        padding: 40px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      }
      .logo-area {
        text-align: center;
        margin-bottom: 24px;
      }
      .logo-area img {
        width: 140px;
        margin-bottom: 10px;
      }
      .logo-area h1 {
        font-size: 22px;
        color: #1a1a2e;
      }
      .logo-area p {
        color: #888;
        font-size: 13px;
        margin-top: 4px;
      }
      .form-row {
        display: flex;
        gap: 16px;
      }
      .form-row .form-group {
        flex: 1;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        font-size: 14px;
        transition: border-color 0.3s;
        outline: none;
      }
      .form-group input:focus {
        border-color: #667eea;
      }
      .btn-register {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 8px;
      }
      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      .btn-register:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }
      .link-login {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: #888;
      }
      .link-login a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
      .blocked-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px 30px;
      }
      .blocked-screen i {
        font-size: 60px;
        color: #e74c3c;
        margin-bottom: 20px;
      }
      .blocked-screen h2 {
        color: #333;
        margin-bottom: 10px;
      }
      .blocked-screen p {
        color: #888;
        font-size: 14px;
      }
      /* Notification */
      .notification-toast {
        position: fixed;
        top: 20px;
        right: 20px;
        min-width: 320px;
        max-width: 400px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        z-index: 10000;
        opacity: 0;
        transform: translateX(400px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .notification-toast.show {
        opacity: 1;
        transform: translateX(0);
      }
      .notification-toast.notification-error {
        border-left: 4px solid #dc2626;
      }
      .notification-toast.notification-success {
        border-left: 4px solid #10b981;
      }
      .notification-icon {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .notification-error .notification-icon {
        background: #fee2e2;
        color: #dc2626;
      }
      .notification-success .notification-icon {
        background: #d1fae5;
        color: #10b981;
      }
      .notification-message {
        flex: 1;
        font-size: 14px;
        color: #374151;
      }
      .notification-close {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border: none;
        background: #f3f4f6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #6b7280;
      }
      @media (max-width: 600px) {
        .form-row {
          flex-direction: column;
          gap: 0;
        }
        .register-container {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-container" id="mainContainer">
      <!-- Tela bloqueada (token inválido) -->
      <div class="blocked-screen" id="blockedScreen" style="display: none">
        <i class="fas fa-shield-alt"></i>
        <h2>Acesso Negado</h2>
        <p>
          Você não tem permissão para acessar esta página.<br />Um link válido é
          necessário para cadastro.
        </p>
      </div>

      <!-- Formulário de cadastro -->
      <div id="formArea">
        <div class="logo-area">
          <img src="../../logos/Logo PetHub (4).svg" alt="PetHub Logo" />
          <h1>Cadastro de Administrador</h1>
          <p>Preencha os dados para criar sua conta</p>
        </div>

        <form id="registerForm" autocomplete="off">
          <div class="form-row">
            <div class="form-group">
              <label>Nome</label>
              <input type="text" id="nome" placeholder="Seu nome" required />
            </div>
            <div class="form-group">
              <label>Sobrenome</label>
              <input
                type="text"
                id="sobrenome"
                placeholder="Seu sobrenome"
                required
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>CPF</label>
              <input
                type="text"
                id="cpf"
                placeholder="000.000.000-00"
                maxlength="14"
                required
              />
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input
                type="text"
                id="telefone"
                placeholder="(00) 00000-0000"
                maxlength="15"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input
              type="password"
              id="senha"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
          </div>
          <div class="form-group">
            <label>Confirmar Senha</label>
            <input
              type="password"
              id="confirmarSenha"
              placeholder="Repita a senha"
              required
            />
          </div>

          <button type="submit" class="btn-register" id="btnRegister">
            <i class="fas fa-user-plus"></i> Criar Conta
          </button>
        </form>
        <div class="link-login">
          Já tem conta?
          <a href="../painel-admin/admin-login.html">Fazer login</a>
        </div>
      </div>
    </div>

    <script>
      const API = window.location.origin + "/api/admin";

      // Obter token da URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      // Notificação
      function showNotification(message, type = "error") {
        const existing = document.querySelector(".notification-toast");
        if (existing) existing.remove();
        const el = document.createElement("div");
        el.className = `notification-toast notification-${type}`;
        el.innerHTML = `
                <div class="notification-icon"><i class="fas fa-${type === "error" ? "exclamation-circle" : "check-circle"}"></i></div>
                <div class="notification-message">${message}</div>
                <button class="notification-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;
        document.body.appendChild(el);
        setTimeout(() => el.classList.add("show"), 10);
        setTimeout(() => {
          el.classList.remove("show");
          setTimeout(() => el.remove(), 300);
        }, 5000);
      }

      // Máscaras
      document.getElementById("cpf").addEventListener("input", function (e) {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 11) v = v.slice(0, 11);
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        e.target.value = v;
      });

      document
        .getElementById("telefone")
        .addEventListener("input", function (e) {
          let v = e.target.value.replace(/\D/g, "");
          if (v.length > 11) v = v.slice(0, 11);
          v = v.replace(/(\d{2})(\d)/, "($1) $2");
          v = v.replace(/(\d{5})(\d)/, "$1-$2");
          e.target.value = v;
        });

      // Validar token ao carregar
      (async function verificarToken() {
        if (!token) {
          document.getElementById("formArea").style.display = "none";
          document.getElementById("blockedScreen").style.display = "flex";
          return;
        }
        try {
          const resp = await fetch(
            `${API}/verificar-token-cadastro?token=${encodeURIComponent(token)}`,
          );
          const data = await resp.json();
          if (!data.valido) {
            document.getElementById("formArea").style.display = "none";
            document.getElementById("blockedScreen").style.display = "flex";
          }
        } catch {
          document.getElementById("formArea").style.display = "none";
          document.getElementById("blockedScreen").style.display = "flex";
        }
      })();

      // Submissão do formulário
      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const btn = document.getElementById("btnRegister");

          const nome = document.getElementById("nome").value.trim();
          const sobrenome = document.getElementById("sobrenome").value.trim();
          const cpf = document.getElementById("cpf").value.trim();
          const telefone = document.getElementById("telefone").value.trim();
          const email = document.getElementById("email").value.trim();
          const senha = document.getElementById("senha").value;
          const confirmarSenha =
            document.getElementById("confirmarSenha").value;

          if (senha !== confirmarSenha) {
            showNotification("As senhas não coincidem", "error");
            return;
          }

          btn.disabled = true;
          btn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';

          try {
            const resp = await fetch(
              `${API}/cadastro?token=${encodeURIComponent(token)}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  nome,
                  sobrenome,
                  cpf,
                  telefone,
                  email,
                  senha,
                }),
              },
            );

            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || "Erro ao cadastrar");

            showNotification(
              "Conta criada com sucesso! Redirecionando...",
              "success",
            );
            setTimeout(() => {
              window.location.href = "../painel-admin/admin-login.html";
            }, 1500);
          } catch (err) {
            showNotification(err.message, "error");
          } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Criar Conta';
          }
        });
    </script>
  </body>
</html>
