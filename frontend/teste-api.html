<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste API Agendamentos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug { background: #f8f9fa; padding: 10px; margin: 10px 0; border-left: 4px solid #007bff; }
        .error { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .success { background: #d4edda; border-color: #28a745; color: #155724; }
        .agendamento { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Teste API de Agendamentos</h1>
    
    <button onclick="testarAPI()">Testar API</button>
    <button onclick="testarFiltros()">Testar Filtros</button>
    
    <div id="resultado" class="debug">
        Clique em "Testar API" para carregar os dados...
    </div>
    
    <div id="agendamentos"></div>
    
    <script>
        let agendamentosData = [];
        
        async function testarAPI() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = 'Carregando...';
            
            try {
                console.log('Fazendo requisição para /api/agendamentos...');
                const response = await fetch('/api/agendamentos');
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.ok) {
                    agendamentosData = await response.json();
                    console.log('Dados recebidos:', agendamentosData);
                    
                    resultado.className = 'debug success';
                    resultado.innerHTML = `
                        <strong>Sucesso!</strong><br>
                        Status: ${response.status}<br>
                        Agendamentos carregados: ${agendamentosData.length}<br>
                        Dados: <pre>${JSON.stringify(agendamentosData, null, 2)}</pre>
                    `;
                    
                    renderizarAgendamentos(agendamentosData);
                } else {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
                resultado.className = 'debug error';
                resultado.innerHTML = `
                    <strong>Erro!</strong><br>
                    ${error.message}<br>
                    <details>
                        <summary>Detalhes</summary>
                        <pre>${error.stack}</pre>
                    </details>
                `;
            }
        }
        
        function renderizarAgendamentos(agendamentos) {
            const container = document.getElementById('agendamentos');
            
            if (agendamentos.length === 0) {
                container.innerHTML = '<p>Nenhum agendamento encontrado.</p>';
                return;
            }
            
            const html = agendamentos.map(agendamento => `
                <div class="agendamento">
                    <strong>ID:</strong> ${agendamento.id}<br>
                    <strong>Horário:</strong> ${agendamento.horario}<br>
                    <strong>Pet:</strong> ${agendamento.petNome}<br>
                    <strong>Cliente:</strong> ${agendamento.clienteNome}<br>
                    <strong>Serviço:</strong> ${agendamento.servico}<br>
                    <strong>Profissional:</strong> ${agendamento.profissional}<br>
                    <strong>Valor:</strong> R$ ${agendamento.valor}<br>
                    <strong>Status:</strong> ${agendamento.status}<br>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        function testarFiltros() {
            if (agendamentosData.length === 0) {
                alert('Primeiro carregue os dados com "Testar API"');
                return;
            }
            
            // Testar filtro por status "agendado"
            const agendados = agendamentosData.filter(ag => ag.status === 'agendado');
            const checkins = agendamentosData.filter(ag => ag.status === 'checkin');
            const prontos = agendamentosData.filter(ag => ag.status === 'pronto');
            const cancelados = agendamentosData.filter(ag => ag.status === 'cancelado');
            
            const resultado = document.getElementById('resultado');
            resultado.className = 'debug success';
            resultado.innerHTML = `
                <strong>Teste de Filtros:</strong><br>
                Total: ${agendamentosData.length}<br>
                Agendado: ${agendados.length}<br>
                Check-in: ${checkins.length}<br>
                Pronto: ${prontos.length}<br>
                Cancelado: ${cancelados.length}<br>
                <hr>
                <strong>Agendamentos com status "agendado":</strong><br>
                ${agendados.map(ag => `${ag.id}: ${ag.petNome} - ${ag.servico}`).join('<br>')}
            `;
        }
    </script>
    <script src="/inject-sidebar.js"></script>
</body>
</html>
