    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 10px 10px 0;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .log {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        .info {
            color: #17a2b8;
        }
        .warning {
            color: #ffc107;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Restaurar Dados do Sistema</h1>
        <p class="subtitle">Carregue os dados do banco de dados MySQL para o localStorage do navegador</p>
        
        <button class="btn btn-success" onclick="restaurarTodos()">
            🔄 Restaurar TODOS os Dados
        </button>
        
        <button class="btn" onclick="restaurarClientes()">
            👥 Restaurar Apenas Clientes
        </button>
        
        <button class="btn" onclick="restaurarProdutos()">
            📦 Restaurar Apenas Produtos
        </button>
        
        <button class="btn btn-danger" onclick="limparTudo()">
            🗑️ Limpar LocalStorage
        </button>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString('pt-BR');
            log.innerHTML += `<div class="${type}">[${time}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        async function restaurarClientes() {
            try {
                addLog('📡 Buscando clientes do banco de dados...', 'info');
                const response = await fetch(`${API_URL}/clientes`);
                
                if (!response.ok) throw new Error('Erro ao buscar clientes');
                
                const clientes = await response.json();
                addLog(`✅ ${clientes.length} clientes encontrados`, 'success');
                
                localStorage.setItem('clientes', JSON.stringify(clientes));
                addLog('💾 Clientes salvos no localStorage', 'success');
                
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function restaurarTodos() {
            addLog('🚀 Iniciando restauração completa...', 'info');
            await restaurarClientes();
            await restaurarProdutos();
            addLog('✨ Restauração concluída! Recarregue a página principal.', 'success');
        }
        
        function limparTudo() {
            if (confirm('⚠️ Tem certeza que deseja limpar TODOS os dados do localStorage?')) {
                localStorage.clear();
                addLog('🗑️ localStorage limpo!', 'warning');
            }
        }
        
        // Log inicial
        addLog('Sistema pronto. Clique em um botão para começar.', 'info');
